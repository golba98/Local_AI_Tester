<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chess Pro — a modern, feature-rich chess game with an AI opponent, themes, and a scoring system.">
    <title>Chess Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Theme Cycle Toggle -->
    <div class="theme-switch" id="theme-toggle" aria-label="Cycle theme" role="button" tabindex="0">
        <div id="light-icon" class="active">☼</div>
        <div id="dark-icon">☾</div>
    </div>

    <div class="app-container">

        <header>
            <div>
                <h1>Chess Pro</h1>
                <div id="status">White to move</div>
            </div>

            <!-- HUD: stats + controls -->
            <div class="hud" id="hud">
                <div class="stat">
                    <div class="stat-label">Timer</div>
                    <div id="timer" class="stat-value">20.0s</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Score</div>
                    <div id="score" class="stat-value">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Multiplier</div>
                    <div id="multiplier" class="stat-value">x1</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Combo</div>
                    <div id="combo" class="stat-value">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Level</div>
                    <div id="level" class="stat-value">1</div>
                </div>

                <div class="hud-controls">
                    <select id="theme-select" aria-label="Theme selection"></select>
                    <button id="sound-toggle"    class="secondary">Sound: On</button>
                    <button id="contrast-toggle" class="secondary">High Contrast: Off</button>
                    <button id="motion-toggle"   class="secondary">Reduced Motion: Off</button>
                </div>
            </div>
        </header>

        <main>
            <!-- Chess Board -->
            <div class="board-wrap">
                <div id="chess-board" class="board" tabindex="0" aria-label="Chess board"></div>
                <div id="effects-layer" class="effects-layer" aria-hidden="true"></div>
            </div>

            <!-- Sidebar: history, AI controls, reset -->
            <div class="sidebar">

                <div class="card move-history">
                    <h3>History</h3>
                    <ul id="move-list"></ul>
                </div>

                <!-- AI controls are declared here and wired up in game.js -->
                <div id="ai-controls" class="card" style="display: flex; flex-direction: column; gap: 1rem;">
                    <label
                        for="diff-select"
                        style="font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: var(--text-secondary);"
                    >AI Level</label>

                    <select id="diff-select" aria-label="AI difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>

                    <button id="ai-toggle-btn" class="secondary">Enable AI Opponent</button>
                </div>

                <button id="reset-btn">New Game</button>

            </div>
        </main>

    </div>

    <script src="chess.js"></script>
    <script src="ai.js"></script>
    <script src="game.js"></script>
</body>
</html>
